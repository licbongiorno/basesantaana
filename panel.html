<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Autogestión</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <div class="header-content">
            <h1>Panel de Autogestión</h1>
            <p>Administra tus servicios publicados</p>
        </div>
        <a href="index.html" class="btn-publicar">Volver al inicio</a>
    </header>

    <main class="container form-container">
        
        <div id="seccion-login" class="tarjeta-servicio centrado">
            <h2>Ingresa para gestionar tu perfil</h2>
            <button id="btn-login" class="btn-whatsapp" style="background-color: #4285F4; margin-top:1rem;">
                Continuar con Google
            </button>
        </div>

        <div id="seccion-dashboard" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2>Mis Servicios</h2>
                <button id="btn-crear-nuevo" class="btn-social btn-fb" style="border:none; cursor:pointer;">+ Agregar Nuevo Servicio</button>
            </div>
            <div id="lista-mis-servicios" style="display: flex; flex-direction: column; gap: 1rem;">
                </div>
        </div>

        <div id="seccion-formulario" class="tarjeta-servicio" style="display: none;">
            <h2 id="titulo-formulario">Datos del Servicio</h2>
            
            <form id="form-servicio" class="formulario-estilizado">
                
                <div class="grupo-input">
                    <label>Nombre del Negocio o Profesional *</label>
                    <input type="text" id="nombre" required placeholder="Ej. Juan Pérez - Electricista">
                </div>

                <div class="grupo-input">
                    <label>Categoría Principal *</label>
                    <select id="categoria" required>
                        <option value="">Selecciona un rubro...</option>
                        <option value="Construcción y Albañilería">Construcción y Albañilería</option>
                        <option value="Electricidad y Refrigeración">Electricidad y Refrigeración</option>
                        <option value="Plomería y Gas">Plomería y Gas</option>
                        <option value="Limpieza y Lavaderos">Limpieza y Lavaderos (Autos, Hogar)</option>
                        <option value="Mantenimiento y Jardinería">Mantenimiento y Jardinería</option>
                        <option value="Salud Mental y Psicología">Salud Mental y Psicología</option>
                        <option value="Salud y Médicos">Salud y Médicos</option>
                        <option value="Educación y Clases">Educación y Clases</option>
                        <option value="Estética y Belleza">Estética y Belleza (Uñas, Peluquería)</option>
                        <option value="Arte y Eventos">Arte y Eventos (Teatro, Dibujo, Animación)</option>
                        <option value="Fletes y Logística">Fletes y Logística</option>
                        <option value="Otros">Otros Servicios</option>
                    </select>
                </div>

                <div class="grupo-input">
                    <label>Modalidad de Atención (Lugar) *</label>
                    <select id="ubicacion" required>
                        <option value="A domicilio">Voy a domicilio</option>
                        <option value="En mi local/espacio">En mi local / espacio físico</option>
                        <option value="Ambas (A domicilio y en local)">Ambas (A domicilio y en local)</option>
                    </select>
                </div>

                <div class="grupo-input">
                    <label>Gatillos y Beneficios (Destaca tu anuncio)</label>
                    <div class="check-input"><input type="checkbox" id="urgencias"> <label>🚨 Atiendo Urgencias 24hs</label></div>
                    <div class="check-input"><input type="checkbox" id="presupuesto"> <label>💡 Presupuesto sin cargo</label></div>
                </div>

                <div class="grupo-input">
                    <label>Medios de Pago Aceptados</label>
                    <div class="check-input"><input type="checkbox" id="pago_efectivo" checked> <label>💵 Efectivo</label></div>
                    <div class="check-input"><input type="checkbox" id="pago_transferencia"> <label>📱 Transferencia / Mercado Pago</label></div>
                    <div class="check-input"><input type="checkbox" id="pago_tarjeta"> <label>💳 Tarjetas (Débito/Crédito)</label></div>
                </div>

                <div class="grupo-input">
                    <label>WhatsApp de Contacto *</label>
                    <input type="number" id="whatsapp" required placeholder="Ej. 3510000000">
                </div>

                <div class="grupo-input">
                    <label>Instagram (Opcional)</label>
                    <input type="text" id="instagram" placeholder="Ej. tu_usuario (sin el @)">
                </div>

                <div class="grupo-input">
                    <label>Breve Descripción *</label>
                    <textarea id="descripcion" rows="4" required placeholder="Describe qué ofreces, qué te destaca o qué oficios específicos haces."></textarea>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="submit" id="btn-guardar" class="btn-whatsapp" style="flex: 2;">Guardar Servicio</button>
                    <button type="button" id="btn-cancelar" style="flex: 1; background: #ccc; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Cancelar</button>
                </div>
            </form>
        </div>

    </main>
    <script type="module" src="app.js"></script>
</body>
</html>

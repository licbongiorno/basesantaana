<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio de Servicios Locales</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <div class="header-content">
            <h1>Servicios Locales</h1>
            <p>Encuentra profesionales y oficios de confianza en nuestra zona</p>
            
            <div class="search-box">
                <input list="sugerencias-busqueda" id="buscador" placeholder="¿Qué buscas? (ej. Psicología, Plomero, Uñas)">
                <datalist id="sugerencias-busqueda">
                    <option value="Psicología">
                    <option value="Psiquiatría">
                    <option value="Plomería y Gas">
                    <option value="Electricista">
                    <option value="Uñas Esculpidas">
                    <option value="Peluquería">
                    <option value="Clases Particulares">
                    <option value="Albañilería">
                    <option value="Jardinería">
                    <option value="Fletes">
                </datalist>
            </div>
        </div>
        <button id="btn-nav-panel" class="btn-publicar">Mi Perfil / Publicar</button>
    </header>

    <main class="container">
        
        <div id="vista-directorio">
            <div id="lista-servicios" class="grid-servicios">
                </div>
        </div>

        <div id="vista-panel" style="display: none;" class="form-container">
            <button id="btn-volver-directorio" class="btn-secundario" style="margin-bottom: 1rem;">⬅ Volver al Directorio General</button>
            
            <div id="seccion-login" class="tarjeta-servicio centrado">
                <h2>Ingresa para gestionar tu perfil</h2>
                <button id="btn-login" class="btn-whatsapp" style="background-color: #4285F4; margin-top:1rem;">
                    Continuar con Google
                </button>
            </div>

            <div id="seccion-dashboard" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2>Mis Servicios Publicados</h2>
                    <button id="btn-crear-nuevo" class="btn-social btn-fb" style="border:none; cursor:pointer;">+ Agregar Servicio</button>
                </div>
                <div id="lista-mis-servicios" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>

            <div id="seccion-formulario" class="tarjeta-servicio" style="display: none;">
                <h2 id="titulo-formulario">Datos del Servicio</h2>
                
                <form id="form-servicio" class="formulario-estilizado">
                    <div class="grupo-input">
                        <label>Nombre del Negocio o Profesional *</label>
                        <input type="text" id="nombre" required placeholder="Ej. Bongiorno Nicolas - Psicología">
                    </div>

                    <div class="grupo-input">
                        <label>Categoría Principal *</label>
                        <select id="categoria" required>
                            <option value="">Selecciona un rubro...</option>
                            <option value="Salud Mental y Psicología">Salud Mental y Psicología</option>
                            <option value="Salud y Médicos">Salud y Médicos</option>
                            <option value="Construcción y Albañilería">Construcción y Albañilería</option>
                            <option value="Electricidad y Refrigeración">Electricidad y Refrigeración</option>
                            <option value="Plomería y Gas">Plomería y Gas</option>
                            <option value="Mantenimiento y Jardinería">Mantenimiento y Jardinería</option>
                            <option value="Limpieza y Lavaderos">Limpieza y Lavaderos</option>
                            <option value="Educación y Clases">Educación y Clases</option>
                            <option value="Estética y Belleza">Estética y Belleza</option>
                            <option value="Fletes y Logística">Fletes y Logística</option>
                            <option value="Otros">Otros Servicios</option>
                        </select>
                    </div>

                    <div class="grupo-input">
                        <label>Modalidad de Atención *</label>
                        <select id="ubicacion" required>
                            <option value="100% Online (Virtual)">100% Online (Virtual / Videollamada)</option>
                            <option value="Presencial y Online">Presencial y Online</option>
                            <option value="En mi local/consultorio">En mi local / consultorio</option>
                            <option value="A domicilio">Voy a domicilio</option>
                            <option value="Ambas (A domicilio y en local)">Ambas (A domicilio y local)</option>
                        </select>
                    </div>

                    <div class="grupo-input">
                        <label>WhatsApp de Contacto *</label>
                        <input type="number" id="whatsapp" required placeholder="Ej. 3516575261">
                    </div>

                    <div class="grupo-input">
                        <label style="color:#e1306c;">Enlace de Instagram (Opcional)</label>
                        <input type="text" id="instagram" placeholder="Ej. instagram.com/tu_usuario">
                    </div>

                    <div class="grupo-input">
                        <label style="color:#1877f2;">Enlace de Facebook (Opcional)</label>
                        <input type="text" id="facebook" placeholder="Ej. facebook.com/tu_pagina">
                    </div>

                    <div class="grupo-input">
                        <label>Gatillos (Destaca tu anuncio)</label>
                        <div class="check-input"><input type="checkbox" id="urgencias"> <label>🚨 Atiendo Urgencias 24hs</label></div>
                        <div class="check-input"><input type="checkbox" id="presupuesto"> <label>💡 Presupuesto sin cargo</label></div>
                    </div>

                    <div class="grupo-input">
                        <label>Breve Descripción *</label>
                        <textarea id="descripcion" rows="4" required placeholder="Describe qué ofreces detalladamente."></textarea>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <button type="submit" id="btn-guardar" class="btn-whatsapp" style="flex: 2;">Guardar Servicio</button>
                        <button type="button" id="btn-cancelar" style="flex: 1; background: #ccc; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <a href="https://wa.me/5493516575261?text=Hola,%20tengo%20una%20sugerencia%20para%20el%20directorio%20de%20Santa%20Ana:" target="_blank" class="btn-sugerencias">
        💡 Sugerencias
    </a>

    <script type="module" src="app.js"></script>
</body>
</html>
